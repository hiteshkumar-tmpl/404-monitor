kind = "web"
previewPath = "/"
title = "SiteWatch"
version = "1.0.0"
id = "artifacts/monitor-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23372

[services.development]
run = "npm run dev -w @workspace/monitor-app"

[services.production]
build = [ "npm", "run", "build", "-w", "@workspace/monitor-app" ]
publicDir = "artifacts/monitor-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23372"
BASE_PATH = "/"
